name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Check whether this version already has a release ──────────
      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: skip
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release ${{ steps.ver.outputs.tag }} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Toolchain setup ───────────────────────────────────────────
      - uses: actions/setup-node@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.skip.outputs.skip == 'false'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        if: steps.skip.outputs.skip == 'false'
        with:
          workspaces: './src-tauri -> target'

      # ── Build ─────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false'
        run: npm ci

      - name: Run tests
        if: steps.skip.outputs.skip == 'false'
        run: npm test -- --run

      # tauri-action builds the app, tags the commit, and publishes the release.
      # TAURI_SIGNING_PRIVATE_KEY signs the .app.tar.gz so the in-app updater
      # can verify the download before installing. Generate a keypair once with:
      #   npx tauri signer generate
      # Then add the private key to GitHub secret TAURI_SIGNING_PRIVATE_KEY.
      - name: Build and publish release
        if: steps.skip.outputs.skip == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: 'Dev Workbench ${{ steps.ver.outputs.tag }}'
          releaseBody: |
            ## Download

            **macOS (Universal — Apple Silicon + Intel):** download the `.dmg` file below.

            Open the `.dmg`, drag **Dev Workbench** to Applications, and launch it from the menu bar.

            ---

            > **First-launch note (Gatekeeper):** The app is not notarized yet.
            > Right-click the app → **Open** → confirm. You only need to do this once.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      # ── Update latest.json for in-app auto-updater ────────────────
      # Reads the .sig file generated by tauri-action, finds the release asset URL,
      # and commits updates/latest.json back to main with [skip ci] so this step
      # doesn't trigger another workflow run.
      - name: Update updates/latest.json
        if: steps.skip.outputs.skip == 'false'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"

          # Find the signed update bundle produced by tauri-action
          SIG_FILE=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos \
            -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "No .sig file found — skipping latest.json update"
            exit 0
          fi
          SIGNATURE=$(cat "$SIG_FILE")

          # Get the .app.tar.gz download URL from the GitHub release
          ASSET_URL=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .browserDownloadUrl' \
            | head -1)

          if [ -z "$ASSET_URL" ]; then
            echo "No .app.tar.gz asset found in release — skipping latest.json update"
            exit 0
          fi

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          cat > updates/latest.json << JSON
          {
            "version": "$VERSION",
            "notes": "",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIGNATURE",
                "url": "$ASSET_URL"
              }
            }
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/latest.json
          git commit -m "chore: update latest.json for $TAG [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
