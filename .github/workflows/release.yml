name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Check whether this version already has a release ──────────
      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: skip
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release ${{ steps.ver.outputs.tag }} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Toolchain setup ───────────────────────────────────────────
      - uses: actions/setup-node@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.skip.outputs.skip == 'false'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        if: steps.skip.outputs.skip == 'false'
        with:
          workspaces: './src-tauri -> target'

      # ── Build ─────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false'
        run: npm ci

      - name: Run tests
        if: steps.skip.outputs.skip == 'false'
        run: npm test -- --run

      # tauri-action builds the app, tags the commit, and publishes the release.
      # TAURI_SIGNING_PRIVATE_KEY signs the .app.tar.gz so the in-app updater
      # can verify the download before installing. Generate a keypair once with:
      #   npx tauri signer generate
      # Then add the private key to GitHub secret TAURI_SIGNING_PRIVATE_KEY.
      - name: Build and publish release
        if: steps.skip.outputs.skip == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: 'Dev Workbench ${{ steps.ver.outputs.tag }}'
          releaseBody: |
            ## Download

            **macOS (Universal — Apple Silicon + Intel):** download the `.dmg` file below.

            Open the `.dmg`, drag **Dev Workbench** to Applications, and launch it from the menu bar.

            ---

            > **First-launch note (Gatekeeper):** The app is not notarized yet.
            > Right-click the app → **Open** → confirm. You only need to do this once.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      # ── Update latest.json for in-app auto-updater ────────────────
      - name: Update updates/latest.json
        if: steps.skip.outputs.skip == 'false'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"

          # Find the .app.tar.gz anywhere in the target tree
          APP_TGZ=$(find src-tauri/target -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -z "$APP_TGZ" ]; then
            echo "No .app.tar.gz found in target — skipping latest.json update"
            exit 0
          fi
          echo "Found bundle: $APP_TGZ"

          # Sign the bundle
          npx tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" "$APP_TGZ"
          SIGNATURE=$(cat "${APP_TGZ}.sig")

          # Upload .app.tar.gz to the release (tauri-action only uploads .dmg)
          gh release upload "$TAG" "$APP_TGZ" --repo "$GITHUB_REPOSITORY" --clobber

          # Construct download URL directly — format is always predictable
          APP_TGZ_NAME=$(basename "$APP_TGZ")
          ENCODED_NAME=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$APP_TGZ_NAME")
          ASSET_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$ENCODED_NAME"
          echo "Asset URL: $ASSET_URL"

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "$ASSET_URL" \
            '{version: $version, notes: "", pub_date: $pub_date, platforms: {"darwin-universal": {signature: $signature, url: $url}}}' \
            > updates/latest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/latest.json
          git commit -m "chore: update latest.json for $TAG [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
